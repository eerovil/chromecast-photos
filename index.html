<!DOCTYPE html>
<html>
<head>
<title>Eeron Dashboard</title>
<meta charset="utf-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/axios/0.21.1/axios.min.js" integrity="sha512-bZS47S7sPOxkjU/4Bt0zrhEtWx0y0CRkhEp8IckzK+ltifIIE9EMIMTuT/mEzoIMewUINruDBIR/jJnbguonqQ==" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js" integrity="sha512-WFN04846sdKMIP5LKNphMaWzU7YpMyCU245etK3g/2ARYbPK9Ub18eG+ljU96qKRCWh+quCY7yefSmlkQw1ANQ==" crossorigin="anonymous"></script>
  <!-- Post load all the goods used to interact with sender. -->
  <script src="//ajax.googleapis.com/ajax/libs/jquery/2.0.3/jquery.min.js"></script>

  <script type="text/javascript"
      src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js">
  </script>
<style>
body {
    width: 100%;
    margin: 0;
    background-color: black;
}
.video, .img {
    display: none;
    height: 100%;
}
.video {
    z-index: 9999;
}
#left, #right {
    position: absolute;
    height: 100vh;
    top: 0;
}
#right {
    right: 0;
}
#right * {
    float: right
}
span.info {
    position: absolute;
    bottom: 0.5rem;
    right: 1rem;
    color: white;
}
#message {
    color: white;
    font-size: 3rem;
}
</style>
</head>
<body>
<div id="right">
    <video id="castMediaElement" class="video" loop>
    Your browser does not support the video tag.
    </video>
    <span class="info"></span>
    <img class="img">
    </img>
</div>
<div id="message">
    Waiting for api key...
</div>
<script>

window.onload = function() {

var changeSecs = 10;
var nextMedia;
var turn = 'left';  // Which image/video will change
var boxes = [];
var apiToken = null;
var images = [];
var videos = [];
var hiddenMediaIds = new Set();
var albums = [];
var hiddenAlbums = [];
var fetchPageTimeout = null;
var player = document.querySelector("#castMediaElement")

// Google Photos Picker catalog (chunked from sender); when true, skip Library API fetchPage.
var pickerMode = false;
var pickerChunkTotal = 0;
var pickerChunks = {};
var playbackStarted = false;

function ensurePlaybackStarted() {
    if (playbackStarted) return;
    if (!apiToken) return;
    if (pickerMode) {
        if (images.length === 0 && videos.length === 0) return;
    } else {
        if (albums.length === 0) return;
    }
    playbackStarted = true;
    document.querySelector("#message").innerHTML = "";
    initBoxes();
    for (let box of boxes) {
        fetchNext(box);
    }
    mainLoop();
    if (!pickerMode && albums.length > 0) {
        fetchPage();
    }
}

function applyPickerChunksComplete() {
    var merged = [];
    for (var i = 0; i < pickerChunkTotal; i++) {
        var part = pickerChunks[i];
        if (part && part.length) {
            merged = merged.concat(part);
        }
    }
    pickerChunks = {};
    revokeAllFetchedBlobs();
    images = [];
    videos = [];
    merged.forEach(function (m) {
        if (!m || !m.mimeType) return;
        if (hiddenMediaIds.has(m.id)) return;
        if (m.mimeType.indexOf("video") === 0) {
            videos.push(m);
        } else {
            images.push(m);
        }
    });
    pickerMode = true;
    albums = [];
    if (fetchPageTimeout) {
        clearTimeout(fetchPageTimeout);
        fetchPageTimeout = null;
    }
    if (playbackStarted) {
        boxes.forEach(function (b) {
            b.currMedia = null;
            b.nextMedia = null;
            b.prevChange = null;
            b.nextMediaReady = true;
        });
        for (let box of boxes) {
            fetchNext(box);
        }
    } else {
        ensurePlaybackStarted();
    }
    log("Picker catalog applied: " + images.length + " images, " + videos.length + " videos");
}

if (window.location.href.indexOf('localhost') == -1) {
    const context = cast.framework.CastReceiverContext.getInstance();
    context.addCustomMessageListener('urn:x-cast:com.eerovil.chromecast-photos', function (customEvent) {
        if (customEvent.data.type == "message") {
            document.getElementById("message").innerHTML = customEvent.data.text;
            if (customEvent.data.text && customEvent.data.text.startsWith('https')) {
                baseUrl = customEvent.data.text;
                log("baseUrl updated to " + baseUrl)
            }
        }
        if (customEvent.data.type == "apiToken") {
            console.log("Got api token!")
            apiToken = customEvent.data.text;
            ensurePlaybackStarted();
        }
        if (customEvent.data.type == "pickedMediaStart") {
            try {
                var start = JSON.parse(customEvent.data.text);
                pickerChunkTotal = start.totalChunks || 0;
                pickerChunks = {};
                pickerMode = true;
                revokeAllFetchedBlobs();
                images = [];
                videos = [];
                if (fetchPageTimeout) {
                    clearTimeout(fetchPageTimeout);
                    fetchPageTimeout = null;
                }
                albums = [];
                log("Expecting " + pickerChunkTotal + " picker chunk(s)");
            } catch (e) {
                log("pickedMediaStart parse error " + e);
            }
        }
        if (customEvent.data.type == "pickedMediaChunk") {
            try {
                var chunk = JSON.parse(customEvent.data.text);
                var idx = chunk.index;
                pickerChunks[idx] = chunk.items || [];
                var allIn = true;
                for (var k = 0; k < pickerChunkTotal; k++) {
                    if (!Object.prototype.hasOwnProperty.call(pickerChunks, k)) {
                        allIn = false;
                        break;
                    }
                }
                if (pickerChunkTotal > 0 && allIn) {
                    applyPickerChunksComplete();
                }
            } catch (e) {
                log("pickedMediaChunk error " + e);
            }
        }
        if (customEvent.data.type == "albums" || customEvent.data.type == "album") {
            pickerMode = false;
            albums = JSON.parse(customEvent.data.text).map(albumId => ({id: albumId}));
            console.log("Got albums:", albums)
            images = [];
            videos = [];
            ensurePlaybackStarted();
        }
        if (customEvent.data.type == "hiddenAlbums") {
            hiddenAlbums = JSON.parse(customEvent.data.text).map(albumId => ({id: albumId}));
            console.log("Got hiddenAlbums:", hiddenAlbums)
            hiddenMediaIds = new Set();
        }
    });
    // Cast api will automatically use castMediaElement as player
    const playerManager = context.getPlayerManager();

    const playerData = {};
    const playerDataBinder = new cast.framework.ui.PlayerDataBinder(playerData);

    const options = new cast.framework.CastReceiverOptions();

    options.disableIdleTimeout = true;

    context.start(options);
}

function log(message) {
    if (message.indexOf(' left') > -1) {
        return;
    }
    console.log("local: ", message)
}

function errorHandler(msg, url, lineNo, columnNo, error) {
    log("Error! " + msg + " " + url + " " + lineNo)
}

window.onerror = errorHandler;

function initBoxes() {
    boxes = [
        {
            id: "left",
            currMedia: null,
            nextMedia: null,
            prevChange: null,  // Last changed
            nextMediaReady: true,
        },
        {
            id: "right",
            currMedia: null,
            nextMedia: null,
            prevChange: null,  // Last changed
            nextMediaReady: true,
        },
    ]

    player.addEventListener('error', function (event) {
        let box = boxes[1];
        if (box.nextMedia) {
            log("Box " + box.id + " video nextMedia error.")
        } else if (box.currMedia) {
            log("Box " + box.id + " video currMedia error.")
            box.currMedia.error = true;
        }
    });

}
function buildFullUrl(mediaItem) {
    return mediaItem.baseUrl + "=w2048-h1024";
}

function revokeMediaBlobUrl(url) {
    if (url && String(url).indexOf('blob:') === 0) {
        try { URL.revokeObjectURL(url); } catch (e) {}
    }
}

// Google Photos base URLs require Authorization; <img>/<video> cannot send Bearer → 403 without this.
function fetchAuthBlobUrl(fullUrl, token) {
    return fetch(fullUrl, { headers: { Authorization: 'Bearer ' + token } })
        .then(function (r) {
            if (!r.ok) {
                return r.text().then(function (t) {
                    throw new Error('Media ' + r.status + ' ' + (t || ''));
                });
            }
            return r.blob();
        })
        .then(function (blob) {
            return URL.createObjectURL(blob);
        });
}

function preloadMediaItem(box) {
    var m = box.nextMedia;
    box.nextMediaReady = false;
    if (!m || !apiToken) {
        box.nextMediaReady = true;
        return;
    }
    if (m.mimeType.indexOf('image/') === 0) {
        fetchAuthBlobUrl(buildFullUrl(m), apiToken)
            .then(function (blobUrl) {
                revokeMediaBlobUrl(m._blobUrl);
                m._blobUrl = blobUrl;
                box.nextMediaReady = true;
                log("Box " + box.id + " (image) nextMedia = " + m.id);
            })
            .catch(function (e) {
                log("preload image " + e);
                m.error = true;
                box.nextMediaReady = true;
            });
    } else if (m.mimeType.indexOf('video/') === 0) {
        fetchAuthBlobUrl(m.baseUrl + "=dv", apiToken)
            .then(function (blobUrl) {
                revokeMediaBlobUrl(m._blobUrl);
                m._blobUrl = blobUrl;
                player.setAttribute('loop', '');
                player.src = blobUrl;
                player.load();
                var onReady = function () {
                    box.nextMediaReady = true;
                    player.removeEventListener('canplaythrough', onReady);
                    log("Box " + box.id + " (video) nextMedia = " + m.id);
                };
                player.addEventListener('canplaythrough', onReady);
            })
            .catch(function (e) {
                log("preload video " + e);
                m.error = true;
                box.nextMediaReady = true;
            });
    } else {
        box.nextMediaReady = true;
    }
}

function fetchNext(box) {
    box.nextMedia = null;
    if (box.id == "right" && box.currMedia && box.currMedia.mimeType.match(/^image/)) {
        // Get video
        let unPlayedVideos = videos.filter(mediaItem => !mediaItem.played)
        if (unPlayedVideos.length == 0 && videos.length > 0) {
            console.log("All videos played, resetting.")
            videos.forEach(mediaItem => {
                mediaItem.played = false;
            })
            unPlayedVideos = videos;
        }
        box.nextMedia = _.sample(unPlayedVideos)
    } else {
        // Get image
        let unPlayedImages = images.filter(mediaItem => !mediaItem.played)
        if (unPlayedImages.length == 0 && images.length > 0) {
            console.log("All images played, resetting.")
            images.forEach(mediaItem => {
                mediaItem.played = false;
            })
            unPlayedImages = images;
        }
        box.nextMedia = _.sample(unPlayedImages)
    }
    if (box.nextMedia) {
        box.nextMedia.played = true;
        preloadMediaItem(box)
    } else {
        setTimeout(() => fetchNext(box), 1000)
    }
}

function mainLoop() {
    try {
    for (let box of boxes) {
        const now = new Date();
        const elapsed = box.prevChange == null ? null : ((now.getTime() - box.prevChange.getTime()) / 1000.0)
        let shouldChange = (box.prevChange == null || elapsed > changeSecs)
        if (box.currMedia && box.currMedia.mimeType.indexOf('video/') === 0 && player.duration) {
            let videoLength = player.duration;
            if (videoLength > (60 * 5)) {
                videoLength = (60 * 1)  // Show only 1 min of over 5 min videos
            }
            shouldChange = shouldChange && elapsed > videoLength;
        }
        const hasError = (box.currMedia || {}).error
        if (box.nextMedia && (shouldChange || hasError)) {
            log("Box " + box.id + " shouldChange" + (hasError ? " has error!" : ""))
            // If media is not ready, don't switch to it. Instead get a new media
            if (box.nextMediaReady) {
                box.currMedia = box.nextMedia;
                const infoEl = document.querySelector("#" + box.id + " .info");
                if (infoEl) {
                    infoEl.innerHTML = "";
                    if (box.currMedia && box.currMedia.mediaMetadata && box.currMedia.mediaMetadata.creationTime) {
                        infoEl.innerHTML = (new Date(box.currMedia.mediaMetadata.creationTime)).toLocaleDateString('fi');
                    }
                }
                box.nextMedia = null;
                box.prevChange = new Date();
                let imageEl = document.querySelector("#" + box.id + " .img")
                if (box.currMedia.mimeType.indexOf('video/') === 0) {
                    log("Displaying video for box " + box.id)
                    if (imageEl) {
                        imageEl.style.display = "none";
                    }
                    player.style.display = 'inline';
                    var mw = (box.currMedia.mediaMetadata && box.currMedia.mediaMetadata.width) || 1920;
                    var mh = (box.currMedia.mediaMetadata && box.currMedia.mediaMetadata.height) || 1080;
                    const aspectRatio = mw / mh;
                    player.style.width = `${window.innerHeight * aspectRatio}px`
                    if (box.currMedia._blobUrl) {
                        player.src = box.currMedia._blobUrl;
                    }
                    player.play()
                    console.log(box.currMedia)
                } else {
                    log("Displaying image for box " + box.id)
                    if (!imageEl) {
                        fetchNext(box);
                        continue;
                    }
                    imageEl.style.display = "inline";
                    if (box.currMedia._blobUrl) {
                        imageEl.src = box.currMedia._blobUrl;
                    } else if (apiToken) {
                        fetchAuthBlobUrl(buildFullUrl(box.currMedia), apiToken).then(function (u) {
                            revokeMediaBlobUrl(imageEl._displayBlob);
                            imageEl._displayBlob = u;
                            imageEl.src = u;
                        }).catch(function (e) { log(e); });
                    }
                    if (box.id == "right") {
                        player.style.display = 'none';
                        player.pause();
                    }
                }
            } else {
                log("Box " + box.id + " nextMediaReady was false!")
            }
            fetchNext(box)
        }
    }
    } catch (err) {
        initBoxes();
        for (let box of boxes) {
            fetchNext(box)
        }
        log(err)
    }
    setTimeout(mainLoop, 500)
}

function fetchPage() {
    if (pickerMode) {
        return;
    }
    // Fetch a single page from all albums, then wait a bit and do it again.
    const config = {
        headers: { Authorization: `Bearer ${apiToken}` }
    };
    console.log(albums)
    if (images.length > 5000) {
        console.log("Stopping image fetch, more than 5000")
        return;
    }
    for (const album of albums) {
        let axiosPromise;
        if (album.pageToken == "stop") {
            continue;
        }
        if (album.id === "allMedia") {
            const pageTokenQuery = !!album.pageToken ? `&pageToken=${album.pageToken}` : '';
            axiosPromise = axios.get(
                `https://photoslibrary.googleapis.com/v1/mediaItems?pageSize=100${pageTokenQuery}`,
                config
            )
        } else {
            axiosPromise = axios.post(
                'https://photoslibrary.googleapis.com/v1/mediaItems:search',
                {
                    "albumId": album.id,
                    "pageSize": "100",
                    "pageToken": (album.pageToken || ""),
                },
                config
            )
        }
        axiosPromise.then(resp => {
            if (!resp.data || !resp.data.mediaItems) {
                return;
            }
            album.pageToken = resp.data.nextPageToken;
            if (!album.pageToken) {
                album.pageToken = "stop";
            }
            for (const mediaItem of resp.data.mediaItems) {
                if (hiddenMediaIds.has(mediaItem.id)) {
                    console.log("Mediaitem hidden: ", mediaItem);
                    continue;
                }
                if (mediaItem.mimeType.startsWith('video')) {
                    videos.push(mediaItem)
                } else {
                    images.push(mediaItem)
                }
            }
        })
    }
    for (const album of hiddenAlbums) {
        let axiosPromise;
        if (album.pageToken == "stop") {
            continue;
        }
        axios.post(
            'https://photoslibrary.googleapis.com/v1/mediaItems:search',
            {
                "albumId": album.id,
                "pageSize": "100",
                "pageToken": (album.pageToken || ""),
            },
            config
        ).then(resp => {
            if (!resp.data || !resp.data.mediaItems) {
                return;
            }
            album.pageToken = resp.data.nextPageToken;
            if (!album.pageToken) {
                album.pageToken = "stop";
            }
            for (const mediaItem of resp.data.mediaItems) {
                hiddenMediaIds.add(mediaItem.id)
            }
        })
    }
    // Wait longer for multiple albums to keep quota better
    var albumCount = Math.max(1, albums.length + hiddenAlbums.length);
    fetchPageTimeout = setTimeout(fetchPage, 10 * 1000 * albumCount);
}

window.setData = function(_apiToken, _albums, _hiddens) {
    apiToken = _apiToken;
    albums = _albums;
    hiddenAlbums = _hiddens || [];
    pickerMode = false;
    ensurePlaybackStarted();
}

// Localhost / tests: pass token + normalized media items (same shape as picker chunks merged).
window.setPickerCatalog = function (_apiToken, items) {
    apiToken = _apiToken;
    pickerMode = true;
    albums = [];
    revokeAllFetchedBlobs();
    images = [];
    videos = [];
    (items || []).forEach(function (m) {
        if (!m || !m.mimeType) return;
        if (m.mimeType.indexOf("video") === 0) {
            videos.push(m);
        } else {
            images.push(m);
        }
    });
    playbackStarted = false;
    ensurePlaybackStarted();
}

function revokeAllFetchedBlobs() {
    function wipe(arr) {
        (arr || []).forEach(function (m) {
            revokeMediaBlobUrl(m._blobUrl);
            m._blobUrl = null;
        });
    }
    wipe(images);
    wipe(videos);
}

window.resetData = function() {
    revokeAllFetchedBlobs();
    images = [];
    videos = [];
    // Clear pageToken
    albums.forEach(album => {
        album.pageToken = null;
    })
    hiddenAlbums.forEach(album => {
        album.pageToken = null;
    })
    if (fetchPageTimeout){
        clearTimeout(fetchPageTimeout)
        fetchPageTimeout = null;
    }
    if (!pickerMode) {
        fetchPage();
    }
}

// empty arrays every 25min
setTimeout(window.resetData, (25 * 60 * 1000))

};
</script>
</body>
</html>
